# fly.toml app configuration file generated for pandoraai on 2026-05-07T01:54:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pandoraai'
primary_region = 'dfw'

[build]

[env]
  DATA_DIR = '/data'
  FLASK_ENV = 'production'

[[mounts]]
  source = 'igh_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
