{% extends "base.html" %}
{% block title %}Sign in - Spectofire{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="brand">
    <img src="/static/logo.svg" class="logo" alt="IGH">
    <h1>Spectofire</h1>
    <p class="tag">by IGH HEALTH FIRE SAFETY</p>
  </div>
  <div class="login-card">
    <h2>Inspector sign in</h2>
    <p class="muted">Enter your IGH credentials to begin inspections.</p>
    <form method="post">
      <div class="field" style="padding:0;margin-bottom:12px;">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field" style="padding:0;margin-bottom:18px;">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn full">Sign in</button>
    </form>
    <div class="login-hint">Demo: <strong>inspector</strong> / <strong>igh2026</strong></div>
  </div>
</div>
{% endblock %}
