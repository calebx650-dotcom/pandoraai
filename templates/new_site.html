{% extends "base.html" %}
{% block title %}New site - Spectofire{% endblock %}
{% block topbar_title %}New Site{% endblock %}
{% block content %}
<div class="pagehead">
  <h2>Add site</h2>
  <p>Customer details for inspections and reports.</p>
</div>

<form method="post">
  <div class="card-title">Customer</div>
  <div class="card">
    <div class="field"><label>Customer name</label><input type="text" name="customer_name" required></div>
    <div class="field"><label>Site / location name</label><input type="text" name="site_name" required></div>
    <div class="field"><label>Address</label><input type="text" name="address"></div>
  </div>

  <div class="card-title">Contact</div>
  <div class="card">
    <div class="field"><label>Contact name</label><input type="text" name="contact_name"></div>
    <div class="field"><label>Phone</label><input type="tel" name="contact_phone"></div>
    <div class="field"><label>Email</label><input type="email" name="contact_email" placeholder="manager@example.com"></div>
  </div>

  <div class="card-title">Notes</div>
  <div class="card">
    <div class="field"><label>Internal notes</label><textarea name="notes" rows="3" placeholder="Anything inspectors should know"></textarea></div>
  </div>

  <div style="padding: 16px;">
    <button type="submit" class="btn full">Save site</button>
  </div>
</form>
{% endblock %}
