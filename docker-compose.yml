
version: '3.8'
services:
  neo4j:
    image: neo4j:4.4
    container_name: neo4j_db
    ports:
      - "7474:7474"  # Web interface
      - "7687:7687"  # Bolt protocol for the driver
    volumes:
      - ./data/neo4j:/data
    environment:
      - NEO4J_AUTH=neo4j/password123  # Sets the username and password
